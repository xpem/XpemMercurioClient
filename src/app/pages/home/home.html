<div class="container">
    <div class="col-sm-6 mb-3 mb-sm-0">
        @if (userProfile?.mercadoLivreCredentialid) {
        <div class="card mb-3" style="max-width: 540px;">
            <div class="row g-0">
                <div class="col-md-4">
                    <img src="/MercadoLivreIcon.png" class="img-fluid rounded-start" alt="Mercado Livre" loading="lazy">
                </div>
                <div class="col-md-8">
                    <div class="card-body">
                        <h5 class="card-title">Mercado Livre</h5>
                        <p class="card-text">Acesse para ser redirecionado para a página de autenticação do mercado
                            livre</p>
                        <!-- style="background-color: #ffe600;" -->
                        <a class="btn btn-info" (click)="conectarMercadoLivre()"><i
                                class="bi bi-link"></i>&nbsp;&nbsp;Permitir
                            Conexão</a>
                    </div>
                </div>
            </div>
        </div>
        }
    </div>
    <!-- futuramente, possibilitar a opção de conectar com a shopee -->
</div>
