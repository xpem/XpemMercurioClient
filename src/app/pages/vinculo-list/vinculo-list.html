<app-sidebar></app-sidebar>
<div class="container">
    <h4>Vínculos</h4>
    <div class="col-sm-6 mb-3 mb-sm-0">
        @if (userProfile()?.mercadoLivreCredentialid) {
        <div class="card mb-3" style="max-width: 540px;">
            <div class="row g-0">
                <div class="col-md-4">
                    <img src="/MercadoLivreIcon.png" class="img-fluid rounded-start" alt="Mercado Livre" loading="lazy">
                </div>
                <div class="col-md-8">
                    <div class="card-body">
                        <h5 class="card-title">Mercado Livre</h5>
                        <p class="card-text">Importe suas vendas do Mercado Livre para o sistema</p>
                        <button class="btn btn-info btn-sm me-2" data-bs-toggle="modal"
                            data-bs-target="#ImportSingleOrderModal"><i class="bi bi-file-earmark"></i>&nbsp;&nbsp;Venda
                            Única</button>
                        <button class="btn btn-danger btn-sm"><i class="bi bi-files"></i>&nbsp;&nbsp;Por
                            Período</button>
                    </div>
                </div>
            </div>
        </div>
        }
    </div>
    <!-- futuramente, possibilitar a opção de conectar com a shopee -->

    <!-- Modal -->
    <div class="modal fade" id="ImportSingleOrderModal" tabindex="-1" aria-labelledby="ImportSingleOrderModal"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Id da venda</label>
                        <input type="text" class="form-control" id="exampleFormControlInput1"
                            placeholder="Digite o ID da venda">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                        data-bs-target="#ConfirmImportSingleOrderModal"><i
                            class="bi bi-arrow-down-square-fill"></i>&nbsp;&nbsp;Importar</button>
                </div>
            </div>
        </div>
    </div>
