@if (isLoading()) {
<div class="spinner-grow" role="status">
    <span class="visually-hidden">Loading...</span>
</div>
}
@else {
<div class="col-lg-12 d-flex justify-content-between">
    <a routerLink="/home" class="btn btn-sm btn-outline-info mb-3" style="margin-top: 20px"><i
            class="bi bi-arrow-left"></i>&nbsp;&nbsp;Voltar</a>
    <button class="btn btn-sm btn-primary mb-3" style="margin-top: 20px"><i
            class="bi bi-printer"></i>&nbsp;&nbsp;
            @if(orders().printStatus == 1) {
                Reimprimir etiqueta
            }
            @else {
                Imprimir etiqueta teste
            }
        </button>
</div>
<div class="col-lg-12">

    <div class="col-lg-12 d-flex justify-content-between border-bottom border-info mb-1">
        <p class="h5 text-info mb-1">#{{orders().externalId}}</p>
        <p class="fst-italic text-body-secondary mb-0">{{orders().createdAt}}</p>
    </div>
    <div class="col-lg-12 row">
        <div class="col-lg-3 mb-3">
            <label for="status" class="form-label">Situação</label>
            <input type="text" class="form-control form-control-sm" id="status" value="{{orders().status}}" readonly>
        </div>
        <div class="col-lg-3 mb-3">
            <label for="marketplace" class="form-label">Marketplace</label>
            <input type="text" class="form-control form-control-sm" id="marketplace"
                value="{{orders().marketPlaceText}}" readonly>
        </div>
    </div>
    <div class="h5 pb-2 mb-1 text-secondary  border-bottom border-secondary ">
        Comprador
    </div>
    <p>#{{orders().buyer?.externalId}}</p>
    <div class="col-lg-12 row">
        <div class="col-lg-4 mb-3">
            <input type="text" class="form-control form-control-sm" id="firstName" value="{{orders().buyer?.firstName}}"
                readonly>
        </div>
        <div class="col-lg-6 mb-3">
            <input type="text" class="form-control form-control-sm" id="lastName" value="{{orders().buyer?.lastName}}"
                readonly>
        </div>
    </div>
    <div class="h5 pb-2 mb-1 text-secondary  border-bottom border-secondary ">
        Produtos
    </div>
    @for(product of orders().products; track $index) {
    <div class="col-lg-12 row">
        <div class="col-lg-9 mb-3">
            <label for="productTitle" class="form-label">Produto</label>
            <div class="col-lg-12 row">
                <div class="col-lg-8 mb-3">
                    <input type="text" class="form-control form-control-sm" id="productTitle" value="{{product.title}}"
                        readonly>
                </div>
                <div class="col-lg-4 mb-3">
                    <input type="text" class="form-control form-control-sm" id="productId"
                        value="#{{product.externalId}}" readonly>
                </div>
            </div>
        </div>
        <div class="col-lg-1 mb-3">
            <label for="quantity" class="form-label">Quantidade</label>
            <input type="text" class="form-control form-control-sm" id="quantity" value="{{product.quantity}}" readonly>
        </div>
        <div class="col-lg-2">
            <label for="quantity" class="form-label">Valor unitário</label>
            <div class="input-group input-group-sm mb-3">
                <span class="input-group-text">R$</span>
                <input type="text" class="form-control form-control-sm" aria-label="Valor Unitário"
                    value="{{product.unitPrice}}" readonly>
            </div>
        </div>
    </div>
    }
    <!-- <div class="col-lg-12 d-flex justify-content-end border-top border-white pt-2">
        <h5 class="text-white">Total: R$ {{orders().totalAmount}}</h5>
    </div> -->
    <div class="col-lg-12 d-flex justify-content-end border-top border-white pt-2">
        <h5 class="text-white">Total: R$ {{orders().paidAmount}}</h5>
    </div>
</div>
}
