@if (isLoading()) {
<div class="spinner-grow" role="status">
    <span class="visually-hidden">Loading...</span>
</div>
}
@else {
<div class="col-lg-12 d-flex justify-content-between">
    <a routerLink="/home" class="btn btn-sm btn-outline-info mb-1" style="margin-top: 20px"><i
            class="bi bi-arrow-left"></i>&nbsp;&nbsp;Voltar</a>
</div>
<div class="col-lg-12 container">
    <div class="col-lg-12 d-flex justify-content-between border-bottom border-info mb-2">
        <p class="h5 text-info">#OrderID</p>
        <p class="fst-italic text-body-secondary">12/11/2025 14:00</p>
    </div>
    <div class="col-lg-12 row">
        <div class="col-lg-3 mb-3">
            <label for="status" class="form-label">Situação</label>
            <input type="text" class="form-control" id="status" value="Pendente" readonly>
        </div>
        <div class="col-lg-3 mb-3">
            <label for="marketplace" class="form-label">Marketplace</label>
            <input type="text" class="form-control" id="marketplace" value="Mercado Livre" readonly>
        </div>
    </div>
    <div class="h5 pb-2 mb-1 text-secondary  border-bottom border-secondary ">
        Comprador
    </div>
    <p>#BuyerID</p>
    <div class="col-lg-12 row">
        <div class="col-lg-4 mb-3">
            <input type="text" class="form-control" id="firstName" value="Emanuel" readonly>
        </div>
        <div class="col-lg-6 mb-3">
            <input type="text" class="form-control" id="lastName" value="Martins Siqueira" readonly>
        </div>
    </div>
    <div class="h5 pb-2 mb-1 text-secondary  border-bottom border-secondary ">
        Produtos
    </div>
    <div class="col-lg-12 row">
        <div class="col-lg-9 mb-3">
            <label for="productTitle" class="form-label">Produto</label>
            <div class="col-lg-12 row">
                <div class="col-lg-8 mb-3">
                    <input type="text" class="form-control" id="productTitle" value="mouse sem fio mx660" readonly>
                </div>
                <div class="col-lg-4 mb-3">
                    <input type="text" class="form-control" id="productId" value="#OrderProductID" readonly>
                </div>
            </div>
        </div>
        <div class="col-lg-1 mb-3">
            <label for="quantity" class="form-label">Quantidade</label>
            <input type="text" class="form-control" id="quantity" value="2" readonly>
        </div>
        <div class="col-lg-2">
            <label for="quantity" class="form-label">Valor unitário</label>
            <div class="input-group mb-3">
                <span class="input-group-text">R$</span>
                <input type="text" class="form-control" aria-label="Valor Unitário" value="100,00" readonly>
            </div>
        </div>
    </div>
        <div class="col-lg-12 row">
        <div class="col-lg-9 mb-3">
            <label for="productTitle" class="form-label">Produto</label>
            <div class="col-lg-12 row">
                <div class="col-lg-8 mb-3">
                    <input type="text" class="form-control" id="productTitle" value="mouse sem fio mx660" readonly>
                </div>
                <div class="col-lg-4 mb-3">
                    <input type="text" class="form-control" id="productId" value="#OrderProductID" readonly>
                </div>
            </div>
        </div>
        <div class="col-lg-1 mb-3">
            <label for="quantity" class="form-label">Quantidade</label>
            <input type="text" class="form-control" id="quantity" value="2" readonly>
        </div>
        <div class="col-lg-2">
            <label for="quantity" class="form-label">Valor unitário</label>
            <div class="input-group mb-3">
                <span class="input-group-text">R$</span>
                <input type="text" class="form-control" aria-label="Valor Unitário" value="100,00" readonly>
            </div>
        </div>
    </div>

    <div class="col-lg-12 d-flex justify-content-end border-top border-white pt-2">
        <h5 class="text-white">Total: R$ 200,00</h5>
    </div>
</div>
}
