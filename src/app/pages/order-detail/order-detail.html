@if (isLoading()) {
<div class="spinner-grow" role="status">
    <span class="visually-hidden">Loading...</span>
</div>
}
@else {
<div class="container-fluid">
    <div class="col-lg-12 d-flex justify-content-between">
        <a routerLink="/home" class="btn btn-sm btn-outline-info mb-3" style="margin-top: 20px"><i
                class="bi bi-arrow-left"></i>&nbsp;&nbsp;Voltar</a>
        @if(order().marketPlace == "1" && order().shipmentId != null && order().shipmentId !== '') {
        <button class="btn btn-sm btn-primary mb-3" style="margin-top: 20px" (click)="printShipmentLabel()"><i
                class="bi bi-printer"></i>&nbsp;&nbsp;
            @if(order().printStatus == 1) {
            Reimprimir etiqueta
            }
            @else {
            Imprimir etiqueta
            }
        </button>
        }
    </div>
    <div class="col-lg-12">
        <div class="col-lg-12 d-flex justify-content-between border-bottom border-info mb-1">
            <p class="h5 text-info mb-1">#{{order().externalId}}</p>
            <p class="fst-italic text-body-secondary mb-0">{{order().createdAt}}</p>
        </div>
        <div class="col-lg-12 row">
            <div class="col-lg-3 form-floating mb-3">
                <input type="text" readonly class="form-control-plaintext" id="situation" value="{{order().status}}">
                <label for="situation">Situação</label>
            </div>
            <div class="col-lg-3 form-floating mb-3">
                <input type="text" readonly class="form-control-plaintext" id="marketplace"
                    value="{{order().marketPlaceText}}">
                <label for="marketplace">Marketplace</label>
            </div>
        </div>
        <div class="h6 pb-2 mb-1 text-secondary  border-bottom border-secondary ">
            Comprador
        </div>
        <div class="col-lg-12 row">
            <div class="col-lg-6 form-floating mb-3">
                <input type="text" readonly class="form-control-plaintext" id="marketplace"
                    value="{{order().buyer?.firstName}} {{order().buyer?.lastName}}">
                <label for="marketplace">#{{order().buyer?.externalId}}</label>
            </div>
        </div>
        <div class="h6 pb-2 mb-1 text-secondary  border-bottom border-secondary ">
            Produtos
        </div>
        @for(product of order().products; track $index) {
        <div class="col-lg-12 row">
            <div class="col-lg-8 form-floating mb-3">
                <input type="text" readonly class="form-control-plaintext" id="productTitle" value="{{product.title}}">
                <label for="productTitle">#{{product.externalId}}</label>
            </div>
            <div class="col-lg-2 form-floating mb-3">
                <input type="text" readonly class="form-control-plaintext" id="productQuantity"
                    value="{{product.quantity}}">
                <label for="productQuantity">Quantidade</label>
            </div>
            <div class="col-lg-2 form-floating mb-3">
                <input type="text" readonly class="form-control-plaintext" id="productUnitPrice"
                    value="R$ {{product.unitPrice}}">
                <label for="productUnitPrice">Valor unitário</label>
            </div>
        </div>
        }
        <!-- <div class="col-lg-12 d-flex justify-content-end border-top border-white pt-2">
        <h5 class="text-white">Total: R$ {{orders().totalAmount}}</h5>
    </div> -->
        <div class="col-lg-12 d-flex justify-content-end border-top border-white pt-2">
            <h5 class="text-white">Total: R$ {{order().paidAmount}}</h5>
        </div>
    </div>
</div>
}
