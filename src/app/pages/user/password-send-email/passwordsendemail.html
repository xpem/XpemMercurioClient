
<div style="display: flex; justify-content:center; flex-wrap: wrap; align-content: center; height: 100%; width:100%;">
    <div style="display: flex; justify-content: center; flex-direction:column; width:100%;">
        <div class="col-lg-12" style="display: flex; justify-content: center;">
            <h2><i class="bi bi-key" style="color: white;"></i>&nbsp;&nbsp;Atualizar Senha</h2>
        </div>

        <div class="col-lg-12" style="display: flex; justify-content:center; flex-wrap: wrap; align-content: center; width: 100%;">
            <form [formGroup]="sendEmailUpdatePasswordForm" (ngSubmit)="onSubmit()">
                <div class="row mb-3">
                    <div class="form-group">
                        <label for="inputEmail">Email</label>
                        <input type="email" class="form-control" id="inputEmail" formControlName="email" />
                        <div id="inputEmailHelpBlock" class="form-text">
                            *Será enviado um email com um link para a atualização de sua senha.
                        </div>
                    </div>

                </div>

                <div class="d-grid gap">
                    <button type="submit" class="btn btn-success"><i class="bi bi-envelope"></i>&nbsp;&nbsp;Enviar Email</button>
                </div>

                <div class="col-lg-12" style="margin-top: 20px"><a href="/user/signin"><i class="bi bi-arrow-left"></i>&nbsp;&nbsp;Voltar</a></div>

            </form>
        </div>
    </div>
</div>
