<div class="list-group list-group-flush notifications-container">
  @if (isLoadingNotifications) {
  <div class="d-flex justify-content-center mt-2">
    <div class="spinner-grow text-light" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  }
  @else {
  @for (notif of notifications; track notif.id) {
  <button id="notificationLink-{{notif.id}}"
    (click)="onNotificationClick(notif.id); $event.preventDefault(); $event.stopPropagation()"
    class="list-group-item list-group-item-action border border-{{ notif.borderStyle }} border-2 rounded-1 mb-1">
    <div class="d-flex w-100">
      <h6 class="mb-1 text-light"><i class="bi bi-{{ notif.icon }}"></i> {{ notif.title }}</h6>
    </div>
    <p class="mb-1 small">{{ notif.message }}</p>
    <small class="text-muted float-end" style="font-size: 0.75rem;">{{ notif.createdAt | date:'short' }}</small>
  </button>
  } @empty {
  <div class="p-3 text-center text-muted">Nenhuma notificação nova</div>
  }
  }
</div>
